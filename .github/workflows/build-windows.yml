name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: blacksmith-4vcpu-windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow pytest

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install FFmpeg
        run: choco install ffmpeg --no-progress -y

      - name: Run tests
        run: |
          python -m pytest tests/test_frame_parser.py -q
          python -m pytest tests/test_startup.py -q
          python -m pytest tests/test_desktop_app.py -q

      - name: Build Windows installer
        shell: pwsh
        run: ./build_installer.ps1

      - name: Upload packaged app folder
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: CCFIIDisplayShare-windows-app
          path: dist/CCFIIDisplayShare/**
          if-no-files-found: error

      - name: Upload Windows installer
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: CCFIIDisplayShare-windows-installer
          path: installer/Output/CCFIIDisplayShareInstaller.exe
          if-no-files-found: error

      - name: Package portable app
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: Compress-Archive -Path dist/CCFIIDisplayShare\* -DestinationPath dist/CCFIIDisplayShare-portable.zip -Force

      - name: Determine next release tag
        if: github.event_name != 'pull_request'
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $latestTag = ""

          $latestTag = gh api "repos/$repo/releases/latest" --jq .tag_name 2>$null
          if ($LASTEXITCODE -ne 0) {
            $latestTag = ""
            $LASTEXITCODE = 0
          }

          if ($latestTag -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
          } else {
            $major = 0
            $minor = 1
            $patch = 0
          }

          $nextTag = "v$major.$minor.$patch"
          "tag=$nextTag" >> $env:GITHUB_OUTPUT
          Write-Host "Next release tag: $nextTag"

      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          gh release create $tag `
            "installer/Output/CCFIIDisplayShareInstaller.exe#CCFIIDisplayShareInstaller.exe" `
            "dist/CCFIIDisplayShare-portable.zip#CCFIIDisplayShare-portable.zip" `
            --title $tag `
            --notes "Automated Windows release generated from commit ${{ github.sha }}."
